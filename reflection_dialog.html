<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振り返りシート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3350; --accent: #4f8ef7; --accent2: #7c5cbf;
    --green: #3ecf8e; --orange: #f7a94f; --pink: #f76fa0;
    --text: #e8eaf0; --muted: #7a80a0; --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Noto Sans JP", sans-serif; font-size: 13px; }
  .header { background: linear-gradient(135deg, #1a1d27, #22263a); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .header-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .header-text h1 { font-size: 13px; font-weight: 700; }
  .header-text p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .badges { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 11px; font-family: "Space Mono", monospace; font-size: 11px; }
  .badge.pid  { color: var(--green); border-color: rgba(62,207,142,0.3); }
  .badge.date { color: var(--accent); }
  .form-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .dot.g { background: var(--green); } .dot.o { background: var(--orange); }
  .dot.p { background: var(--accent2); } .dot.pk { background: var(--pink); }
  textarea, input[type="number"] { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: "Noto Sans JP", sans-serif; font-size: 13px; padding: 10px 12px; resize: none; outline: none; transition: border-color 0.2s; width: 100%; }
  textarea:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
  textarea { line-height: 1.6; }
  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-row input[type="number"] { width: 76px; text-align: center; font-family: "Space Mono", monospace; font-size: 16px; font-weight: 700; color: var(--accent); padding: 8px; }
  .bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; transition: width 0.3s; width: 0%; }
  .pct  { font-family: "Space Mono", monospace; font-size: 12px; color: var(--muted); width: 28px; text-align: right; }
  .char { font-size: 10px; color: var(--muted); text-align: right; margin-top: 3px; }
  .divider { height: 1px; background: var(--border); }
  .btn-row { display: flex; gap: 10px; padding: 0 20px 20px; }
  .btn-skip { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: var(--r); color: var(--muted); cursor: pointer; font-family: "Noto Sans JP", sans-serif; font-size: 13px; padding: 11px; transition: all 0.2s; }
  .btn-skip:hover { border-color: var(--muted); color: var(--text); }
  .btn-save { flex: 2; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: var(--r); color: #fff; cursor: pointer; font-family: "Noto Sans JP", sans-serif; font-size: 13px; font-weight: 700; padding: 11px; transition: all 0.2s; }
  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .success { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; text-align: center; }
  .success-circle { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--green), #27a874); display: flex; align-items: center; justify-content: center; font-size: 26px; animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .success h2 { font-size: 15px; font-weight: 700; }
  .success p  { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .save-tag { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 16px; font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 6px; }
  .countdown { font-family: "Space Mono", monospace; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="mainForm">
  <div class="header">
    <div class="header-icon">📋</div>
    <div class="header-text">
      <h1>今日の振り返り</h1>
      <p>CADセッション終了 — 記録を残しましょう</p>
    </div>
    <div class="badges">
      <span class="badge pid"  id="pidBadge">…</span>
      <span class="badge date" id="dateBadge">…</span>
    </div>
  </div>
  <div class="form-body">
    <div class="field">
      <label><span class="dot"></span>今日の作業内容</label>
      <textarea id="workContent" rows="3" placeholder="今日何を作った・モデリングしたか…"></textarea>
      <div class="char"><span id="c1">0</span> 文字</div>
    </div>
    <div class="field">
      <label><span class="dot g"></span>締切に対する進捗</label>
      <div class="progress-row">
        <input type="number" id="progress" min="0" max="100" value="0">
        <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
        <span class="pct">%</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label><span class="dot o"></span>改善点・課題</label>
      <textarea id="issues" rows="2" placeholder="うまくいかなかったこと、詰まった部分…"></textarea>
      <div class="char"><span id="c2">0</span> 文字</div>
    </div>
    <div class="field">
      <label><span class="dot p"></span>CADで気をつけたこと・学んだこと</label>
      <textarea id="cadLearning" rows="2" placeholder="新しく知ったコマンド、気をつけた操作など…"></textarea>
      <div class="char"><span id="c3">0</span> 文字</div>
    </div>
    <div class="field">
      <label><span class="dot pk"></span>次回やること</label>
      <textarea id="nextAction" rows="2" placeholder="次のセッションで最初にやること…"></textarea>
      <div class="char"><span id="c4">0</span> 文字</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-skip" onclick="skip()">スキップ</button>
    <button class="btn-save" id="saveBtn" onclick="submit()">💾 保存して閉じる</button>
  </div>
</div>

<div class="success" id="successScreen">
  <div class="success-circle">✓</div>
  <h2>振り返りを保存しました！</h2>
  <p id="successPid">お疲れ様でした。</p>
  <div class="save-tag" id="saveTag"><span>✓</span> Googleスプレッドシートに保存完了</div>
  <div class="countdown" id="countdown">3秒後に自動で閉じます…</div>
</div>

<script>
  // GASのURL（直接埋め込み）
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwnV0ndg5DOaNevaKvUkjf9DDsHOa5vKsP95LbImucMcYwtN3HYs0rocDy6J0FybqxX/exec";

  const params = new URLSearchParams(window.location.search);
  const pid    = params.get("pid") || "UNKNOWN";

  document.getElementById("pidBadge").textContent  = pid;
  document.getElementById("dateBadge").textContent =
    new Date().toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });

  [["workContent","c1"],["issues","c2"],["cadLearning","c3"],["nextAction","c4"]].forEach(([id,cnt]) => {
    document.getElementById(id).addEventListener("input", () => {
      document.getElementById(cnt).textContent = document.getElementById(id).value.length;
    });
  });

  document.getElementById("progress").addEventListener("input", function() {
    const v = Math.min(100, Math.max(0, parseInt(this.value) || 0));
    this.value = v;
    document.getElementById("barFill").style.width = v + "%";
  });

  async function submit() {
    const btn = document.getElementById("saveBtn");
    btn.disabled = true;
    btn.textContent = "保存中…";

    const now = new Date();
    const data = {
      participant_id: pid,
      timestamp:   now.toLocaleString("ja-JP"),
      date:        now.toLocaleDateString("ja-JP"),
      weekday:     ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][now.getDay()],
      workContent: document.getElementById("workContent").value.trim(),
      progress:    document.getElementById("progress").value,
      issues:      document.getElementById("issues").value.trim(),
      cadLearning: document.getElementById("cadLearning").value.trim(),
      nextAction:  document.getElementById("nextAction").value.trim(),
    };

    try {
      // https同士なのでCORS制限なし・no-corsで送信
      await fetch(GAS_URL, {
        method:  "POST",
        mode:    "no-cors",
        headers: { "Content-Type": "text/plain" },
        body:    JSON.stringify(data)
      });
      showSuccess(true);
    } catch(e) {
      showSuccess(false);
    }
  }

  function showSuccess(ok) {
    document.getElementById("mainForm").style.display = "none";
    const s = document.getElementById("successScreen");
    s.style.display = "flex";
    document.getElementById("successPid").textContent = pid + " — お疲れ様でした。";
    if (!ok) {
      const tag = document.getElementById("saveTag");
      tag.innerHTML = "<span>⚠️</span> 通信エラー（データは未保存）";
      tag.style.color = "#f7a94f";
    }
    let count = 3;
    const cd = document.getElementById("countdown");
    const timer = setInterval(() => {
      count--;
      cd.textContent = count + "秒後に自動で閉じます…";
      if (count <= 0) { clearInterval(timer); window.close(); }
    }, 1000);
  }

  function skip() { window.close(); }
</script>
</body>
</html>
